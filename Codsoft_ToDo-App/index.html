<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Application</title>
    <!-- Linking the external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>TaskFlow Pro</h1>
            <button class="btn theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙 Dark Mode</button>
        </header>

        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tasks</h3>
                <p id="totalTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <p id="completedTasks" class="stat-success">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p id="pendingTasks" class="stat-warning">0</p>
            </div>
        </div>

        <!-- Task Input Form Card -->
        <div class="card">
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Task Title *</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                </div>
                <div class="form-row">
                    <div>
                        <label for="taskCategory">Category</label>
                        <select id="taskCategory">
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                        </select>
                    </div>
                    <div>
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div>
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">✨ Add Task</button>
                <button type="button" class="btn theme-toggle" id="cancelEditBtn" style="display: none; margin-left: 0.5rem;">Cancel</button>
            </form>
        </div>

        <!-- Search and Filter Panel -->
        <div class="controls-row">
            <input type="text" id="searchBar" placeholder="🔍 Search tasks by title...">
            <select id="filterStatus">
                <option value="all">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
            </select>
            <select id="filterCategory">
                <option value="all">All Categories</option>
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
            </select>
        </div>

        <!-- Task List Area -->
        <div class="task-list" id="taskList">
            <!-- Dynamic Tasks will be injected here by script.js -->
        </div>
    </div>

    <!-- Linking the external JavaScript file at the bottom for optimized loading -->
    <script src="script.js"></script>
</body>
</html>
